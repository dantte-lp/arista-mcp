name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
  # Allow release.yml to call this workflow as a gate-1 mirror.
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json
          cache: true
          # Central package management: Directory.Packages.props is the single
          # source of truth for versions; csproj files only carry PackageReference
          # names. Hash both so the cache invalidates on either axis.
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      # Unit tests only — integration tests that hit PostgreSQL run in e2e.yml
      # with a service container. SkippableFact tests skip cleanly when their
      # external resource (models, DB) is absent so we don't need to filter.
      - name: Test
        run: >-
          dotnet test --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --filter "FullyQualifiedName!~AristaMcp.Data.Tests&FullyQualifiedName!~AristaMcp.E2E"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: TestResults
          retention-days: 14
