name: E2E

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
  # Allow release.yml to call this workflow as a release-gate mirror.
  workflow_call:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: stdio + HTTP transport smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # NOTE: we deliberately do NOT use `services:` here because the
    # `options:` field of a service container is passed verbatim to
    # `docker create` — Postgres command-line args like
    # `-c shared_preload_libraries=…` are then misinterpreted as the
    # docker flag `-c, --cpu-shares` and the container fails to start.
    # Instead we launch PG manually below so we get full control over
    # the postgres CMD.

    env:
      ARISTA_MCP__ConnectionString: "Host=localhost;Port=5434;Database=arista;Username=arista;Password=arista"
      # PgvectorFixture refuses to run unless DB name ends with `_test` (safety
      # guard against TRUNCATE-ing a developer's prod ingest). The fixture
      # creates the DB on first connect.
      ARISTA_MCP_TEST_CS: "Host=localhost;Port=5434;Database=arista_test;Username=arista;Password=arista"
      PGHOST: localhost
      PGPORT: "5434"
      PGUSER: arista
      PGPASSWORD: arista
      PGDATABASE: arista

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Start Postgres (vchord-suite pg18) with shared_preload_libraries
        run: |
          set -euo pipefail
          docker run -d \
            --name arista-mcp-postgres \
            -p 5434:5432 \
            -e POSTGRES_DB=arista \
            -e POSTGRES_USER=arista \
            -e POSTGRES_PASSWORD=arista \
            -e POSTGRES_INITDB_ARGS="--data-checksums --encoding=UTF-8" \
            --health-cmd "pg_isready -U arista -d arista" \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 15 \
            tensorchord/vchord-suite:pg18-latest@sha256:c6e5e77a1180199f91b040b6e85c6d10b0ded6d49fb614dfd2e7272ffb91af08 \
            postgres \
              -c shared_preload_libraries=vector,vchord,vchord_bm25,pg_tokenizer \
              -c shared_buffers=512MB \
              -c maintenance_work_mem=1GB \
              -c max_wal_size=2GB
          # Wait for pg_isready
          for i in {1..30}; do
            if docker exec arista-mcp-postgres pg_isready -U arista -d arista >/dev/null 2>&1; then
              echo "postgres ready after $i polls"
              exit 0
            fi
            sleep 2
          done
          echo "postgres did not become ready in 60s" >&2
          docker logs arista-mcp-postgres
          exit 1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Run docker/init.sql
        run: |
          psql -h localhost -p 5434 -U arista -d arista -f docker/init.sql
        env:
          PGPASSWORD: arista

      - name: Cache embedder model
        id: embedder-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: models/embedder
          key: embedder-snowflake-arctic-embed-m-v1.5

      - name: Fetch embedder model (if cache miss)
        if: steps.embedder-cache.outputs.cache-hit != 'true'
        run: pwsh scripts/fetch-models.ps1
        shell: bash

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 9.0.17

      - name: Apply EF migrations
        run: |
          dotnet ef database update \
            --project src/AristaMcp.Data \
            --startup-project src/AristaMcp.Data

      - name: Build solution
        # No prior `dotnet restore` step is wired up — let build auto-restore.
        # `dotnet ef database update` above only restores src/AristaMcp.Data,
        # not the full solution graph.
        run: dotnet build arista-mcp.slnx

      - name: Run unit + integration tests
        run: dotnet test arista-mcp.slnx --no-build --filter "FullyQualifiedName!~E2E"

      - name: Seed a tiny ingest (campus category)
        run: |
          dotnet run --project src/AristaMcp.Cli --no-build -- \
            ingest --catalog arista-docs-fixture/catalog.json --category campus --force --verbose || true
        continue-on-error: true

      - name: Run E2E tests (stdio + HTTP)
        run: dotnet test tests/AristaMcp.E2E --no-build

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-logs-${{ github.run_id }}
          path: |
            **/TestResults/**
            tests/**/*.log
          retention-days: 7

      - name: Stop Postgres
        if: always()
        run: docker rm -f arista-mcp-postgres || true
