services:
  postgres:
    build:
      context: .
      dockerfile: Containerfile
    image: arista-mcp-postgres:18
    container_name: arista-mcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arista
      POSTGRES_USER: arista
      POSTGRES_PASSWORD: arista
      POSTGRES_INITDB_ARGS: --data-checksums --encoding=UTF-8 --locale=C.UTF-8
      PGDATA: /var/lib/postgresql/18/data
    ports:
      # 0.0.0.0 rather than 127.0.0.1: on Windows/Podman (WSL2 backend, UserModeNetworking=false)
      # a 127.0.0.1 bind only exposes the port inside the podman-machine WSL distro, unreachable
      # from the Windows host. Binding to 0.0.0.0 inside WSL2 is forwarded back to Windows localhost
      # via WSL interop. The dev container still only listens on the loopback exposed by WSL.
      - "0.0.0.0:5434:5432"
    volumes:
      - arista-pgdata:/var/lib/postgresql/18/data
    # Memory sized for the post-CRLF-fix corpus scale (~40 k chunks from
    # EOS-User-Manual alone, ~50 k across 2.4 k docs). The pre-v0.1.4
    # 512 MB / 32 MB config OOM-killed during HNSW rebuild + bm25v trigger
    # spike. Rationale for each knob in CLAUDE.md Sprint 8 additions.
    command: >-
      postgres
      -c shared_preload_libraries=vector,vchord,vchord_bm25,pg_tokenizer
      -c max_connections=20
      -c shared_buffers=2GB
      -c effective_cache_size=8GB
      -c work_mem=256MB
      -c maintenance_work_mem=4GB
      -c max_wal_size=4GB
      -c wal_buffers=64MB
      -c io_method=worker
      -c io_workers=3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arista -d arista"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # Sprint 10: Qwen2.5-1.5B-Instruct served by llama.cpp as an OpenAI-compatible
  # HTTP API on 127.0.0.1:8090. Used by the HyDE query-rewriting expander; when
  # unreachable, HydeExpander falls back to the raw query so arista-mcp stays
  # functional with the sidecar down. Opt-in via `--profile llm` so `podman
  # compose up` stays fast for users who don't want HyDE.
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: arista-mcp-llm
    restart: unless-stopped
    profiles: ["llm"]
    # Sprint 13: swap 1.5B → 3B for offline batch query generation /
    # multi-positive annotation. Bigger context + better instruction
    # following. HyDE hot-path (Sprint 10, currently Enabled=false)
    # also benefits when re-enabled. Latency ~2x per call but we are
    # batch-oriented here, not interactive.
    command: >-
      --model /models/qwen2.5-3b-instruct-q4_k_m.gguf
      --port 8090
      --host 0.0.0.0
      --ctx-size 4096
      --threads 8
      --log-disable
    ports:
      # 0.0.0.0 inside podman-machine for the same WSL2 interop reason as postgres.
      - "0.0.0.0:8090:8090"
    volumes:
      - ../models/llm:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  arista-pgdata:
