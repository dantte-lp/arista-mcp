services:
  postgres:
    build:
      context: .
      dockerfile: Containerfile
    image: arista-mcp-postgres:18
    container_name: arista-mcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arista
      POSTGRES_USER: arista
      POSTGRES_PASSWORD: arista
      POSTGRES_INITDB_ARGS: --data-checksums --encoding=UTF-8 --locale=C.UTF-8
      PGDATA: /var/lib/postgresql/18/data
    ports:
      # 0.0.0.0 rather than 127.0.0.1: on Windows/Podman (WSL2 backend, UserModeNetworking=false)
      # a 127.0.0.1 bind only exposes the port inside the podman-machine WSL distro, unreachable
      # from the Windows host. Binding to 0.0.0.0 inside WSL2 is forwarded back to Windows localhost
      # via WSL interop. The dev container still only listens on the loopback exposed by WSL.
      - "0.0.0.0:5434:5432"
    volumes:
      - arista-pgdata:/var/lib/postgresql/18/data
    command: >-
      postgres
      -c shared_preload_libraries=vector,vchord,vchord_bm25,pg_tokenizer
      -c max_connections=50
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=32MB
      -c maintenance_work_mem=2GB
      -c wal_buffers=16MB
      -c io_method=worker
      -c io_workers=3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arista -d arista"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  arista-pgdata:
